services:
  - type: web
    name: online-edu-backend
    runtime: python
    rootDir: backend
    buildCommand: "./scripts/render_build.sh"
    startCommand: "./venv/bin/gunicorn config.wsgi:application --timeout 180 --workers 1 --threads 4 --worker-class gthread --preload"
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: DJANGO_SETTINGS_MODULE
        value: "config.settings.production"
      - key: ALLOWED_HOSTS
        value: "online-education-platform-tdc4.onrender.com,bravoacademy.vercel.app,www.bravoacademy.vercel.app"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://bravoacademy.vercel.app,https://www.bravoacademy.vercel.app,https://bangladeshbravoacademy.vercel.app"
      - key: APPEND_SLASH
        value: "False"
      - key: TIME_ZONE
        value: "Asia/Dhaka"
      - key: PYTHON_VERSION
        value: "3.11.0"
